name: AI4Trade Auto Scraper

on:
  schedule:
    - cron: '0 1,5,9,13,17,21 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Discus Scraper
        env:
          G_SHEETS_CREDS: ${{ secrets.G_SHEETS_CREDS }}
        run: python discus.py

      - name: Run Strategies Scraper
        env:
          G_SHEETS_CREDS: ${{ secrets.G_SHEETS_CREDS }}
        run: python strategies.py
